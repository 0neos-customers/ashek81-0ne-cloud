name: Refresh Skool Cookies

on:
  # Run every 4 hours to keep AWS WAF cookies fresh
  # AWS cookies (aws-waf-token, AWSALB) expire within hours
  schedule:
    - cron: '0 */4 * * *'

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  refresh-cookies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Create temp env file for script
        run: |
          echo "SKOOL_EMAIL=${{ secrets.SKOOL_EMAIL }}" > apps/web/.env.local
          echo "SKOOL_PASSWORD=${{ secrets.SKOOL_PASSWORD }}" >> apps/web/.env.local

      - name: Refresh Skool cookies
        id: refresh
        run: |
          bun run scripts/skool-auth.ts --headless

          # Extract cookies from the generated file
          COOKIES=$(cat scripts/.skool-cookies.json | jq -r '[.[] | "\(.name)=\(.value)"] | join("; ")')

          # Save to output (masked for security)
          echo "::add-mask::$COOKIES"
          echo "cookies=$COOKIES" >> $GITHUB_OUTPUT

      - name: Update Vercel Environment Variable
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          COOKIES="${{ steps.refresh.outputs.cookies }}"

          # Build team query param if set
          TEAM_PARAM=""
          if [ -n "$VERCEL_TEAM_ID" ]; then
            TEAM_PARAM="?teamId=$VERCEL_TEAM_ID"
          fi

          # First, try to get existing env var ID
          EXISTING=$(curl -s -X GET \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env$TEAM_PARAM" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r '.envs[] | select(.key == "SKOOL_COOKIES") | .id')

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            # Update existing env var
            echo "Updating existing SKOOL_COOKIES env var..."
            curl -X PATCH \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$EXISTING$TEAM_PARAM" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"value\":\"$COOKIES\"}"
          else
            # Create new env var
            echo "Creating new SKOOL_COOKIES env var..."
            curl -X POST \
              "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env$TEAM_PARAM" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"SKOOL_COOKIES\",\"value\":\"$COOKIES\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}"
          fi

          echo "✅ Vercel environment variable updated!"

      - name: Trigger Vercel Redeploy
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          # Build team query param if set
          TEAM_PARAM=""
          if [ -n "$VERCEL_TEAM_ID" ]; then
            TEAM_PARAM="?teamId=$VERCEL_TEAM_ID"
          fi

          # Get the latest production deployment
          LATEST=$(curl -s -X GET \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=1$TEAM_PARAM" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r '.deployments[0].uid')

          if [ -n "$LATEST" ] && [ "$LATEST" != "null" ]; then
            echo "Triggering redeploy of deployment: $LATEST"

            # Create a new deployment from the latest
            curl -X POST \
              "https://api.vercel.com/v13/deployments$TEAM_PARAM" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"0ne-app\",\"deploymentId\":\"$LATEST\",\"target\":\"production\"}"

            echo "✅ Redeploy triggered! New env vars will be available shortly."
          else
            echo "⚠️ Could not find latest deployment. New env vars will take effect on next manual deploy."
          fi
